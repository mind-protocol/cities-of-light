<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumina Prime</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#06060c;color:#c0c0c8;font-family:'SF Mono',monospace;overflow:hidden}
  #ui{position:absolute;top:10px;left:10px;z-index:10;background:rgba(8,8,16,.92);padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);font-size:10px;max-width:240px;line-height:1.5}
  #ui h2{font-size:13px;margin-bottom:4px;color:#e0e0e8}
  .d{margin:1px 0;cursor:pointer;display:flex;align-items:center;gap:4px}
  .d .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .legend-section{margin-top:6px;padding-top:4px;border-top:1px solid rgba(255,255,255,0.06)}
  .legend-section h3{font-size:10px;color:#888;margin-bottom:2px}
  #hover{position:absolute;bottom:10px;left:10px;z-index:10;background:rgba(8,8,16,.95);padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.1);font-size:11px;display:none;max-width:350px;line-height:1.4}
  #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;font-size:14px;color:#e0e0e8}
</style>
</head>
<body>
<div id="loading">Loading Lumina Prime...</div>
<div id="ui" style="display:none"><h2>Lumina Prime</h2><div id="stats"></div><div id="types"></div><div id="districts"></div></div>
<div id="hover"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
fetch('city_data.json').then(r=>r.json()).then(init).catch(e=>{
  document.getElementById('loading').textContent='Error: '+e;
});

function init(data){
  document.getElementById('loading').style.display='none';
  document.getElementById('ui').style.display='block';
  document.getElementById('stats').innerHTML=
    data.node_count.toLocaleString()+' nodes — '+data.link_count.toLocaleString()+' links'+
    (data.highways?' — '+data.highways.length+' highways':'');

  // Node type legend
  const typeColors={actor:'#FF6B6B',moment:'#4ECDC4',narrative:'#45B7D1',space:'#96CEB4',thing:'#FFEAA7'};
  const tEl=document.getElementById('types');
  tEl.innerHTML='<div class="legend-section"><h3>node types</h3></div>';
  for(const[t,c]of Object.entries(typeColors)){
    const cnt=data.meta.filter(m=>m.node_type===t).length;
    const div=document.createElement('div');div.className='d';
    div.innerHTML=`<span class="dot" style="background:${c}"></span>${t} (${cnt.toLocaleString()})`;
    tEl.appendChild(div);
  }

  // Districts legend
  const dEl=document.getElementById('districts');
  dEl.innerHTML='<div class="legend-section"><h3>districts</h3></div>';
  for(const[id,d]of Object.entries(data.districts)){
    const div=document.createElement('div');div.className='d';
    div.innerHTML=`<span class="dot" style="background:rgba(${(d.color[0]*255)|0},${(d.color[1]*255)|0},${(d.color[2]*255)|0},0.6)"></span>${id.replace(/_/g,' ')} (${d.count})`;
    dEl.appendChild(div);
  }

  // Scene
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(0x06060c);

  const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,1,800);
  camera.position.set(0,80,250);

  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  document.body.appendChild(renderer.domElement);

  const controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.dampingFactor=0.05;
  controls.autoRotate=true;
  controls.autoRotateSpeed=0.2;
  controls.target.set(0,10,0);

  // Ground reference disc
  const groundGeo=new THREE.RingGeometry(5,data.R_MAX*1.1,64);
  const groundMat=new THREE.MeshBasicMaterial({color:0x0a0a18,side:THREE.DoubleSide,transparent:true,opacity:0.3});
  const ground=new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // Grid on ground
  const grid=new THREE.GridHelper(data.R_MAX*2,30,0x151530,0x0d0d20);
  scene.add(grid);

  // Lights
  scene.add(new THREE.AmbientLight(0x2a2a4e,0.6));
  const sun=new THREE.DirectionalLight(0xffe8d0,1.2);
  sun.position.set(50,100,50);scene.add(sun);
  const rim=new THREE.PointLight(0x4060a0,0.6,400);
  rim.position.set(-100,50,-100);scene.add(rim);

  // ── PointCloud for nodes ──
  const N=data.node_count;
  const posArr=new Float32Array(data.positions);
  const colArr=new Float32Array(data.colors);
  const sizeArr=new Float32Array(data.sizes);

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(posArr,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colArr,3));
  geo.setAttribute('size',new THREE.Float32BufferAttribute(sizeArr,1));

  const pointsMat=new THREE.ShaderMaterial({
    uniforms:{
      uPixelRatio:{value:renderer.getPixelRatio()},
    },
    vertexShader:`
      attribute float size;
      varying vec3 vColor;
      uniform float uPixelRatio;
      void main(){
        vColor=color;
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_Position=projectionMatrix*mv;
        gl_PointSize=size*uPixelRatio*300.0/(-mv.z);
        gl_PointSize=clamp(gl_PointSize,1.0,40.0);
      }
    `,
    fragmentShader:`
      varying vec3 vColor;
      void main(){
        float d=length(gl_PointCoord-0.5)*2.0;
        if(d>1.0)discard;
        float a=1.0-smoothstep(0.0,1.0,d);
        float glow=exp(-d*d*3.0);
        vec3 c=vColor*(0.6+glow*0.8);
        gl_FragColor=vec4(c,a*0.85);
      }
    `,
    transparent:true,
    vertexColors:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
  });

  const points=new THREE.Points(geo,pointsMat);
  scene.add(points);

  // ── Links as LineSegments ──
  if(data.link_indices&&data.link_indices.length>0){
    const linkPos=new Float32Array(data.link_indices.length*3);
    for(let i=0;i<data.link_indices.length;i++){
      const idx=data.link_indices[i];
      linkPos[i*3]=posArr[idx*3];
      linkPos[i*3+1]=posArr[idx*3+1];
      linkPos[i*3+2]=posArr[idx*3+2];
    }
    const linkGeo=new THREE.BufferGeometry();
    linkGeo.setAttribute('position',new THREE.BufferAttribute(linkPos,3));
    const linkMat=new THREE.LineBasicMaterial({color:0x1a1a3a,transparent:true,opacity:0.08,blending:THREE.AdditiveBlending});
    scene.add(new THREE.LineSegments(linkGeo,linkMat));
  }

  // ── Highway curves (bezier beams between districts) ──
  var hwGroup=null;
  if(data.highways&&data.highways.length>0){
    hwGroup=new THREE.Group();
    const maxW=Math.max(...data.highways.map(h=>h.weight));
    for(const hw of data.highways){
      const p=hw.points;
      const curve=new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(p[0][0],p[0][1],p[0][2]),
        new THREE.Vector3(p[1][0],p[1][1],p[1][2]),
        new THREE.Vector3(p[2][0],p[2][1],p[2][2])
      );
      const nw=hw.weight/maxW;
      // Tube beam
      const tubeGeo=new THREE.TubeGeometry(curve,24,0.3+nw*1.2,6,false);
      const tubeMat=new THREE.MeshBasicMaterial({
        color:0xffffff,transparent:true,opacity:0.04+nw*0.08,
        blending:THREE.AdditiveBlending,depthWrite:false
      });
      hwGroup.add(new THREE.Mesh(tubeGeo,tubeMat));
      // Particles along curve
      const pCount=20+Math.floor(nw*40);
      const pPos=new Float32Array(pCount*3);
      const pOff=[];
      for(let i=0;i<pCount;i++){
        pOff.push(Math.random());
        const pt=curve.getPoint(pOff[i]);
        pPos[i*3]=pt.x;pPos[i*3+1]=pt.y;pPos[i*3+2]=pt.z;
      }
      const pGeo=new THREE.BufferGeometry();
      pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
      const pMat=new THREE.PointsMaterial({
        size:0.5+nw*1.0,color:0xffffff,transparent:true,opacity:0.2+nw*0.4,
        blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true
      });
      const pts=new THREE.Points(pGeo,pMat);
      pts.userData={curve,offsets:pOff,speed:0.02+nw*0.05};
      hwGroup.add(pts);
    }
    scene.add(hwGroup);
  }

  // ── Hover (raycasting on points) ──
  const raycaster=new THREE.Raycaster();
  raycaster.params.Points.threshold=1.5;
  const mouse=new THREE.Vector2();
  const hover=document.getElementById('hover');

  renderer.domElement.addEventListener('mousemove',e=>{
    mouse.x=(e.clientX/innerWidth)*2-1;
    mouse.y=-(e.clientY/innerHeight)*2+1;
  });

  function updateHover(){
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObject(points);
    if(hits.length>0){
      const idx=hits[0].index;
      const m=data.meta[idx];
      if(m){
        hover.style.display='block';
        hover.innerHTML=`<strong>${m.node_type}${m.subtype?':'+m.subtype:''}</strong> ${m.label}<br>`+
          `<span style="color:#777">W=${m.weight} E=${m.energy} | ${m.district.replace(/_/g,' ')}</span>`;
      }
    }else{
      hover.style.display='none';
    }
  }

  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });

  (function animate(){
    requestAnimationFrame(animate);
    controls.update();
    updateHover();
    // Animate highway particles
    if(hwGroup){
      for(const child of hwGroup.children){
        if(!child.isPoints||!child.userData.curve)continue;
        const{curve,offsets,speed}=child.userData;
        const pos=child.geometry.attributes.position.array;
        for(let i=0;i<offsets.length;i++){
          offsets[i]=(offsets[i]+speed*0.016)%1.0;
          const pt=curve.getPoint(offsets[i]);
          pos[i*3]=pt.x;pos[i*3+1]=pt.y;pos[i*3+2]=pt.z;
        }
        child.geometry.attributes.position.needsUpdate=true;
      }
    }
    renderer.render(scene,camera);
  })();

  console.log('Lumina Prime loaded:',N,'nodes');
}
</script>
</body>
</html>
