<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Place</title>
  <link rel="stylesheet" href="./place-style.css">
</head>
<body>
  <div id="app">
    <header id="place-header">
      <h1 id="place-name">Connecting...</h1>
      <div id="place-meta">
        <span id="participant-count">0</span> participants
      </div>
    </header>
    <div id="main">
      <aside id="sidebar">
        <h2>Participants</h2>
        <ul id="participant-list"></ul>
      </aside>
      <div id="content">
        <div id="moment-stream"></div>
        <div id="input-area">
          <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
          <button id="send-btn" title="Send">Send</button>
          <button id="mic-btn" title="Push to talk (hold spacebar)">Mic</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./place-app.js"></script>
</body>
</html>
