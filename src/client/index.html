<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cities of Light</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d1b2a; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #enter-vr {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.4);
      cursor: pointer;
      z-index: 100;
      border-radius: 4px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    #enter-vr:hover:not(:disabled) {
      background: rgba(0, 255, 136, 0.25);
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }
    #enter-vr:disabled { opacity: 0.4; cursor: default; }

    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(0, 255, 136, 0.7);
      font-size: 13px;
      z-index: 100;
      line-height: 1.6;
      pointer-events: none;
    }
    #info .title {
      font-size: 16px;
      color: #00ff88;
      margin-bottom: 8px;
    }
    #info .controls {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
    }

    #status {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255, 136, 0, 0.6);
      font-size: 11px;
      z-index: 100;
      text-align: right;
      pointer-events: none;
    }
    #status .connected { color: rgba(0, 255, 136, 0.6); }
    #status .disconnected { color: rgba(255, 68, 68, 0.6); }
  </style>
</head>
<body>
  <div id="info">
    <div class="title">Cities of Light</div>
    Phase 1 — First Encounter
    <div class="controls">
      WASD / Arrows — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Scroll — Zoom
    </div>
  </div>
  <div id="status">
    <span class="disconnected">offline</span>
  </div>
  <button id="enter-vr" disabled>Checking WebXR...</button>
  <script type="module" src="./main.js"></script>
</body>
</html>
