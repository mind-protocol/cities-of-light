<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cities of Light</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #enter-vr {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      font-size: 18px;
      font-family: monospace;
      background: rgba(0, 255, 136, 0.15);
      color: #00ff88;
      border: 1px solid #00ff88;
      cursor: pointer;
      z-index: 100;
      border-radius: 4px;
    }
    #enter-vr:hover { background: rgba(0, 255, 136, 0.3); }
    #enter-vr:disabled { opacity: 0.3; cursor: default; }
    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #00ff88;
      font-family: monospace;
      font-size: 14px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="info">Cities of Light — Phase 1</div>
  <button id="enter-vr" disabled>Checking WebXR...</button>
  <script type="module" src="./main.js"></script>
</body>
</html>
