<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#00ff88">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-512.png">
  <title>Cities of Light</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d1b2a; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #enter-vr {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      font-size: 18px;
      font-family: 'Courier New', monospace;
      background: rgba(0, 255, 136, 0.1);
      color: #00ff88;
      border: 1px solid rgba(0, 255, 136, 0.4);
      cursor: pointer;
      z-index: 100;
      border-radius: 4px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    #enter-vr:hover:not(:disabled) {
      background: rgba(0, 255, 136, 0.25);
      border-color: #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }
    #enter-vr:disabled { opacity: 0.4; cursor: default; }

    #info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(0, 255, 136, 0.7);
      font-size: 13px;
      z-index: 100;
      line-height: 1.6;
      pointer-events: none;
    }
    #info .title {
      font-size: 16px;
      color: #00ff88;
      margin-bottom: 8px;
    }
    #info .controls {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
    }

    #status {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255, 136, 0, 0.6);
      font-size: 11px;
      z-index: 100;
      text-align: right;
      pointer-events: none;
    }
    #status .connected { color: rgba(0, 255, 136, 0.6); }
    #status .disconnected { color: rgba(255, 68, 68, 0.6); }

    #voice-status {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      font-family: 'Courier New', monospace;
      z-index: 100;
      pointer-events: none;
      display: none;
      text-shadow: 0 0 10px currentColor;
    }

    #transcription {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 15px;
      font-family: 'Courier New', monospace;
      color: rgba(255, 255, 255, 0.95);
      z-index: 100;
      pointer-events: none;
      display: none;
      background: rgba(0, 0, 0, 0.75);
      padding: 14px 24px;
      border-radius: 8px;
      max-width: 700px;
      text-align: left;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      line-height: 1.5;
      transition: opacity 2s ease-out;
    }

    /* Stream mode (OBS capture) — cinematic subtitles */
    .stream-mode #transcription {
      bottom: 60px;
      font-size: 20px;
      max-width: 85%;
      padding: 18px 32px;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 12px;
      line-height: 1.6;
    }
    .stream-mode #voice-status {
      bottom: 20px;
      font-size: 16px;
    }

    #stream-watermark {
      position: fixed;
      top: 16px;
      left: 16px;
      color: rgba(0, 204, 255, 0.5);
      font-size: 14px;
      font-family: 'Courier New', monospace;
      z-index: 100;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>
  <div id="info">
    <div class="title">Cities of Light</div>
    Phase 1 — First Encounter
    <div class="controls">
      WASD — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Space — Talk to Manemus
    </div>
  </div>
  <div id="status">
    <span class="disconnected">offline</span>
  </div>
  <div id="voice-status"></div>
  <div id="transcription"></div>
  <div id="stream-watermark">Cities of Light — @Mind_Protocol</div>
  <div id="build-marker" style="position:fixed;top:8px;right:8px;color:rgba(255,255,255,0.25);font-size:10px;font-family:monospace;z-index:50;pointer-events:none;">v3</div>

  <!-- Room + voice indicators -->
  <div id="room-indicator" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);color:rgba(0,255,136,0.5);font-size:11px;font-family:'Courier New',monospace;z-index:100;pointer-events:none;"></div>
  <div id="zone-indicator" style="position:fixed;top:35px;left:50%;transform:translateX(-50%);color:rgba(255,204,68,0.5);font-size:10px;font-family:'Courier New',monospace;z-index:100;pointer-events:none;"></div>
  <div id="voice-chat-status" style="position:fixed;bottom:16px;right:20px;color:rgba(0,255,136,0.4);font-size:10px;font-family:'Courier New',monospace;z-index:100;pointer-events:none;"></div>

  <button id="enter-vr" disabled>Checking WebXR...</button>
  <script>
    // Apply stream mode class for OBS-optimized styles
    if (new URLSearchParams(location.search).get('view') === 'manemus') {
      document.body.classList.add('stream-mode');
      document.getElementById('stream-watermark').style.display = 'block';
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
  <script type="module" src="./main.js"></script>
</body>
</html>
