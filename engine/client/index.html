<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venezia — Cities of Light</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d1b2a; font-family: 'Courier New', monospace; }
    canvas { display: block; cursor: crosshair; }

    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(255, 220, 180, 0.8);
      font-size: 13px;
      z-index: 100;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    #controls-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      z-index: 100;
      pointer-events: none;
    }

    /* Citizen profile panel */
    #citizen-panel {
      display: none;
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 320px;
      max-height: 80vh;
      overflow-y: auto;
      background: rgba(10, 15, 30, 0.92);
      border: 1px solid rgba(255, 200, 100, 0.3);
      border-radius: 12px;
      padding: 24px;
      color: #e8dcc8;
      font-size: 13px;
      line-height: 1.6;
      z-index: 200;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #citizen-panel .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      background: none;
      border: none;
    }
    #citizen-panel .close-btn:hover { color: #fff; }
    #citizen-panel .citizen-name {
      font-size: 20px;
      color: #ffd4a0;
      margin-bottom: 4px;
    }
    #citizen-panel .citizen-class {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      opacity: 0.7;
    }
    #citizen-panel .citizen-desc {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 12px;
      line-height: 1.7;
      color: #c8b8a0;
      margin-bottom: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    #citizen-panel .citizen-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 11px;
    }
    #citizen-panel .stat {
      background: rgba(255,255,255,0.05);
      padding: 6px 10px;
      border-radius: 6px;
    }
    #citizen-panel .stat-label { color: rgba(255,255,255,0.4); }
    #citizen-panel .stat-value { color: #ffd4a0; }
    #citizen-panel .partner-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1));
      border: 1px solid rgba(212,175,55,0.5);
      color: #ffd4a0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }
    #citizen-panel .partner-btn:hover {
      background: linear-gradient(135deg, rgba(212,175,55,0.5), rgba(212,175,55,0.2));
      border-color: #d4af37;
      box-shadow: 0 0 20px rgba(212,175,55,0.2);
    }
    #citizen-panel .partner-btn.chosen {
      background: rgba(0,200,100,0.2);
      border-color: rgba(0,200,100,0.5);
      color: #80ffb0;
    }
  </style>
</head>
<body>
  <div id="status">Loading Venice...</div>
  <div id="controls-hint">WASD — Move | Mouse — Look | Click citizen — Profile | Shift — Down | Space — Up</div>

  <div id="citizen-panel">
    <button class="close-btn" onclick="document.getElementById('citizen-panel').style.display='none'">&times;</button>
    <div class="citizen-name" id="cp-name"></div>
    <div class="citizen-class" id="cp-class"></div>
    <div class="citizen-desc" id="cp-desc"></div>
    <div class="citizen-stats">
      <div class="stat"><span class="stat-label">Ducats</span><br><span class="stat-value" id="cp-ducats"></span></div>
      <div class="stat"><span class="stat-label">Influence</span><br><span class="stat-value" id="cp-influence"></span></div>
      <div class="stat"><span class="stat-label">Guild</span><br><span class="stat-value" id="cp-guild"></span></div>
      <div class="stat"><span class="stat-label">Motto</span><br><span class="stat-value" id="cp-motto"></span></div>
    </div>
    <button class="partner-btn" id="cp-partner-btn" onclick="window.choosePartner()">Choisir comme partenaire</button>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
