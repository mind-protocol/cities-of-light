<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venezia — Cities of Light</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d1b2a; font-family: 'Courier New', monospace; }
    canvas { display: block; cursor: crosshair; }

    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(255, 220, 180, 0.8);
      font-size: 13px;
      z-index: 100;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    #controls-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      z-index: 100;
      pointer-events: none;
    }

    /* Citizen profile panel */
    #citizen-panel {
      display: none;
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 320px;
      max-height: 80vh;
      overflow-y: auto;
      background: rgba(10, 15, 30, 0.92);
      border: 1px solid rgba(255, 200, 100, 0.3);
      border-radius: 12px;
      padding: 24px;
      color: #e8dcc8;
      font-size: 13px;
      line-height: 1.6;
      z-index: 200;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #citizen-panel .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 18px;
      background: none;
      border: none;
    }
    #citizen-panel .close-btn:hover { color: #fff; }
    #citizen-panel .citizen-name {
      font-size: 20px;
      color: #ffd4a0;
      margin-bottom: 4px;
    }
    #citizen-panel .citizen-class {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      opacity: 0.7;
    }
    #citizen-panel .citizen-desc {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 12px;
      line-height: 1.7;
      color: #c8b8a0;
      margin-bottom: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    #citizen-panel .citizen-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 11px;
    }
    #citizen-panel .stat {
      background: rgba(255,255,255,0.05);
      padding: 6px 10px;
      border-radius: 6px;
    }
    #citizen-panel .stat-label { color: rgba(255,255,255,0.4); }
    #citizen-panel .stat-value { color: #ffd4a0; }
    #citizen-panel .partner-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1));
      border: 1px solid rgba(212,175,55,0.5);
      color: #ffd4a0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }
    #citizen-panel .partner-btn:hover {
      background: linear-gradient(135deg, rgba(212,175,55,0.5), rgba(212,175,55,0.2));
      border-color: #d4af37;
      box-shadow: 0 0 20px rgba(212,175,55,0.2);
    }
    #citizen-panel .partner-btn.chosen {
      background: rgba(0,200,100,0.2);
      border-color: rgba(0,200,100,0.5);
      color: #80ffb0;
    }

    /* Stele / Book Reader */
    #stele-reader {
      display: none;
      position: fixed;
      top: 5vh;
      left: 10vw;
      width: 80vw;
      height: 90vh;
      background: rgba(8, 10, 20, 0.96);
      border: 1px solid rgba(136, 204, 255, 0.3);
      border-radius: 16px;
      z-index: 300;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(136, 204, 255, 0.15), 0 16px 48px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #stele-reader .stele-header {
      padding: 20px 24px 12px;
      border-bottom: 1px solid rgba(136, 204, 255, 0.15);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    #stele-reader .stele-title {
      font-size: 22px;
      color: #88CCFF;
      font-family: Georgia, serif;
      flex: 1;
    }
    #stele-reader .stele-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #stele-reader .stele-lang {
      display: flex;
      gap: 4px;
    }
    #stele-reader .lang-btn {
      padding: 4px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(136, 204, 255, 0.2);
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    #stele-reader .lang-btn:hover { border-color: rgba(136, 204, 255, 0.5); color: #88CCFF; }
    #stele-reader .lang-btn.active {
      background: rgba(136, 204, 255, 0.15);
      border-color: #88CCFF;
      color: #88CCFF;
    }
    #stele-reader .stele-close {
      position: absolute;
      top: 14px;
      right: 18px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 24px;
      background: none;
      border: none;
      z-index: 10;
    }
    #stele-reader .stele-close:hover { color: #fff; }
    #stele-reader .stele-body {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      line-height: 1.9;
      color: #d8cbb8;
      white-space: pre-wrap;
    }
    #stele-reader .stele-body h1 { font-size: 28px; color: #88CCFF; margin: 32px 0 16px; text-align: center; }
    #stele-reader .stele-body h2 { font-size: 20px; color: #a0c8e0; margin: 24px 0 12px; }
    #stele-reader .stele-body h3 { font-size: 16px; color: #88CCFF; margin: 16px 0 8px; }
    #stele-reader .stele-body p { margin-bottom: 12px; text-indent: 2em; }
    #stele-reader .stele-body em { color: #c0a880; }
    #stele-reader .stele-body hr { border: none; border-top: 1px solid rgba(136,204,255,0.15); margin: 32px 0; }
    #stele-reader .stele-body::-webkit-scrollbar { width: 6px; }
    #stele-reader .stele-body::-webkit-scrollbar-track { background: transparent; }
    #stele-reader .stele-body::-webkit-scrollbar-thumb { background: rgba(136,204,255,0.2); border-radius: 3px; }
    #stele-reader .stele-footer {
      padding: 12px 24px;
      border-top: 1px solid rgba(136, 204, 255, 0.15);
      text-align: center;
      flex-shrink: 0;
    }
    #stele-reader .stele-buy-btn {
      display: inline-block;
      padding: 8px 24px;
      background: linear-gradient(135deg, rgba(136,204,255,0.2), rgba(136,204,255,0.05));
      border: 1px solid rgba(136,204,255,0.4);
      color: #88CCFF;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s;
    }
    #stele-reader .stele-buy-btn:hover {
      background: rgba(136,204,255,0.3);
      box-shadow: 0 0 20px rgba(136,204,255,0.2);
    }
  </style>
</head>
<body>
  <div id="status">Loading Venice...</div>
  <div id="controls-hint">WASD — Move | Mouse — Look | V — Talk | Click citizen — Profile | Click stele — Read</div>
  <div id="voice-status" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);font-size:14px;font-family:monospace;z-index:100;pointer-events:none;display:none;text-shadow:0 0 10px currentColor;background:rgba(0,0,0,0.6);padding:8px 16px;border-radius:6px;"></div>
  <button id="mic-btn" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,100,100,0.5);background:rgba(255,50,50,0.15);color:#ff6666;font-size:24px;cursor:pointer;z-index:100;backdrop-filter:blur(8px);transition:all 0.2s;" title="Hold to talk (or press V)">🎤</button>

  <!-- Stele / Book Reader overlay -->
  <div id="stele-reader">
    <div class="stele-header">
      <div class="stele-title" id="sr-title"></div>
      <div class="stele-meta" id="sr-meta"></div>
      <div class="stele-lang">
        <button class="lang-btn active" id="sr-lang-fr" onclick="window.switchSteleLanguage('fr')">FR</button>
        <button class="lang-btn" id="sr-lang-en" onclick="window.switchSteleLanguage('en')">EN</button>
      </div>
      <button class="stele-close" onclick="document.getElementById('stele-reader').style.display='none'">&times;</button>
    </div>
    <div class="stele-body" id="sr-body"></div>
    <div class="stele-footer">
      <a id="sr-buy-link" href="#" target="_blank" class="stele-buy-btn">Buy on Amazon</a>
    </div>
  </div>

  <div id="citizen-panel">
    <button class="close-btn" onclick="document.getElementById('citizen-panel').style.display='none'">&times;</button>
    <div class="citizen-name" id="cp-name"></div>
    <div class="citizen-class" id="cp-class"></div>
    <div class="citizen-desc" id="cp-desc"></div>
    <div class="citizen-stats">
      <div class="stat"><span class="stat-label">Ducats</span><br><span class="stat-value" id="cp-ducats"></span></div>
      <div class="stat"><span class="stat-label">Influence</span><br><span class="stat-value" id="cp-influence"></span></div>
      <div class="stat"><span class="stat-label">Guild</span><br><span class="stat-value" id="cp-guild"></span></div>
      <div class="stat"><span class="stat-label">Motto</span><br><span class="stat-value" id="cp-motto"></span></div>
    </div>
    <div id="cp-connections" style="color:rgba(200,180,120,0.8);font-size:11px;margin:8px 0;font-style:italic;"></div>
    <button class="partner-btn" id="cp-partner-btn" onclick="window.choosePartner()">Choisir comme partenaire</button>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
