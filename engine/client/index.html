<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venezia — Cities of Light</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d1b2a; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #canvas-container { width: 100vw; height: 100vh; }

    #status {
      position: fixed;
      top: 20px;
      left: 20px;
      color: rgba(255, 220, 180, 0.8);
      font-size: 13px;
      z-index: 100;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    #controls-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      z-index: 100;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="status">Loading Venice...</div>
  <div id="controls-hint">WASD — Move | Mouse — Look | Shift — Fast | Space/Q — Up/Down</div>
  <script type="module" src="./app.js"></script>
</body>
</html>
